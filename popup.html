<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Mock Master</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- ── Toolbar ──────────────────────────────────────────────────────── -->
    <header class="toolbar">
      <div class="toolbar-left">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 9l3 3-3 3M13 15h3M3 5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5z"/>
        </svg>
        <span class="app-title">API Mock</span>
      </div>
      <div class="toolbar-right">
        <button class="icon-btn" id="btn-search" title="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-clear" title="Clear all mocks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
        </button>
        <label class="toggle-wrap" title="Enable / disable all mocks">
          <input type="checkbox" id="global-toggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <button class="icon-btn" id="btn-add-group" title="Add new group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
        </button>
        <button class="icon-btn accent" id="btn-add" title="Add new mock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Search bar ────────────────────────────────────────────────────── -->
    <div class="search-bar hidden" id="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search by URL or label…" autocomplete="off">
      <button class="clear-search-btn" id="btn-close-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- ── Mock list ─────────────────────────────────────────────────────── -->
    <div id="mock-list"></div>

    <!-- ── Empty state ──────────────────────────────────────────────────── -->
    <div class="empty-state hidden" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
      </svg>
      <p>No mocks configured yet</p>
      <button class="btn-primary" id="btn-add-first">Add your first mock</button>
    </div>

    <!-- ── No results state ─────────────────────────────────────────────── -->
    <div class="empty-state hidden" id="no-results">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <p>No mocks match your search</p>
    </div>

  </div>

  <!-- ── Confirm dialog ───────────────────────────────────────────────────── -->
  <div class="overlay hidden" id="confirm-overlay">
    <div class="confirm-dialog">
      <p id="confirm-msg">Are you sure?</p>
      <div class="confirm-actions">
        <button class="btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
